<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChiselGrid - Capture Email</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      background: #ffffff;
      color: #0f172a;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e2e8f0;
    }
    .header img { width: 24px; height: 24px; }
    .header h1 { font-size: 16px; font-weight: 600; }
    #preview {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    #capture-btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #capture-btn:hover { background: #1d4ed8; }
    #capture-btn:active { background: #1e40af; }
    #status {
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="https://cdn.chiselgrid.com/addins/outlook/icon-32.png" alt="ChiselGrid" />
    <h1>ChiselGrid</h1>
  </div>

  <div id="preview">
    <p style="font-size:13px;color:#94a3b8;">Loading email details...</p>
  </div>

  <button id="capture-btn">Capture to ChiselGrid</button>

  <p id="status"></p>

  <script src="taskpane.js"></script>
</body>
</html>
